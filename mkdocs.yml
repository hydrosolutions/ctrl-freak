site_name: ctrl-freak
site_description: Pure-numpy genetic algorithm framework for single-objective (GA) and multi-objective (NSGA-II) optimization
site_url: https://hydrosolutions.github.io/ctrl-freak/
repo_url: https://github.com/hydrosolutions/ctrl-freak
repo_name: hydrosolutions/ctrl-freak
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            docstring_options:
              warn_unknown_params: false
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Usage Guide: usage.md
  - User Contracts: contracts.md
  - API Reference: api.md
  - Validation: validation.md
