name: release

"on":
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target index"
        type: choice
        options:
          - testpypi
        default: testpypi

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.0"
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: publish to TestPyPI (dry run)
    needs: build
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi') ||
      (github.event_name == 'release' && github.event.release.prerelease == true)
    environment:
      name: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.0"

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI via OIDC
        run: uv publish --trusted-publishing always --publish-url https://test.pypi.org/legacy/ dist/*

  publish-pypi:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'release' && github.event.release.prerelease == false
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.0"

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via OIDC
        run: uv publish --trusted-publishing always dist/*
